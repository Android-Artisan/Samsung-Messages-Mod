name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Apktool
        run: |
          mkdir -p ~/bin
          wget https://raw.githubusercontent.com/iBotPeaches/Apktool/refs/heads/main/scripts/linux/apktool -O ~/bin/apktool
          wget https://github.com/iBotPeaches/Apktool/releases/download/v3.0.1/apktool_3.0.1.jar -O ~/bin/apktool.jar
          chmod +x ~/bin/apktool
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Build
        run: apktool b . -o unsigned.apk

      - name: Sign
        run: |
          wget https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O signer.jar
          java -jar signer.jar --apks unsigned.apk --out output

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SamsungMessagesMod
          path: output/*.apk
